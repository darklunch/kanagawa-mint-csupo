<!DOCTYPE html>
<html><head><style>html,body{margin:0;padding:0;overflow:hidden}</style></head>
<body>
<svg width="3840" height="2160" viewBox="0 0 3840 2160" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#16161d"/>
    <stop offset="0.7" stop-color="#1c1c26"/>
    <stop offset="1" stop-color="#1f1f28"/>
  </linearGradient>
  <radialGradient id="sunglow" cx="0.5" cy="0.5" r="0.5">
    <stop offset="0" stop-color="#ff9e3b" stop-opacity="0.3"/>
    <stop offset="0.5" stop-color="#ff9e3b" stop-opacity="0.1"/>
    <stop offset="1" stop-color="#ff9e3b" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#e6c384"/>
    <stop offset="1" stop-color="#ff9e3b"/>
  </linearGradient>
  <linearGradient id="waveBody" x1="0.1" y1="0" x2="0.4" y2="1">
    <stop offset="0" stop-color="#2d4f67"/>
    <stop offset="0.5" stop-color="#223249"/>
    <stop offset="1" stop-color="#141a24"/>
  </linearGradient>
  <linearGradient id="waveFace" x1="0" y1="0" x2="0.25" y2="1">
    <stop offset="0" stop-color="#3a6a8a"/>
    <stop offset="1" stop-color="#223249"/>
  </linearGradient>
  <linearGradient id="swell" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#223249"/>
    <stop offset="1" stop-color="#16161d"/>
  </linearGradient>
  <radialGradient id="vignette" cx="0.5" cy="0.42" r="0.85">
    <stop offset="0.55" stop-color="#000000" stop-opacity="0"/>
    <stop offset="1" stop-color="#0d0d12" stop-opacity="0.55"/>
  </radialGradient>
  <filter id="soft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="14"/></filter>
  <filter id="soft30" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="28"/></filter>
</defs>

<rect width="3840" height="2160" fill="url(#sky)"/>

<!-- stars -->
<g fill="#dcd7ba">
  <circle cx="420" cy="240" r="3" opacity="0.45"/><circle cx="900" cy="150" r="2" opacity="0.3"/>
  <circle cx="1400" cy="300" r="2.5" opacity="0.4"/><circle cx="1900" cy="170" r="2" opacity="0.3"/>
  <circle cx="2400" cy="260" r="2" opacity="0.35"/><circle cx="2900" cy="150" r="2.5" opacity="0.4"/>
  <circle cx="3300" cy="320" r="2" opacity="0.3"/><circle cx="3650" cy="200" r="3" opacity="0.45"/>
  <circle cx="640" cy="480" r="2" opacity="0.25"/><circle cx="3500" cy="520" r="2" opacity="0.25"/>
</g>

<!-- striped sun, high right -->
<circle cx="3120" cy="480" r="560" fill="url(#sunglow)"/>
<circle cx="3120" cy="480" r="170" fill="url(#sun)"/>
<g fill="#1c1c26" clip-path="circle(170px at 3120px 480px)">
  <rect x="2940" y="516" width="360" height="9"/>
  <rect x="2940" y="558" width="360" height="14"/>
  <rect x="2940" y="608" width="360" height="20"/>
</g>

<!-- distant Fuji on the horizon, small (the print's scale trick) -->
<path d="M 2680 1560 L 2985 1330 L 3320 1560 Z" fill="#181820"/>
<path d="M 2905 1390 L 2985 1330 L 3070 1392 L 3030 1386 L 3000 1408 L 2965 1384 L 2938 1404 Z" fill="#dcd7ba" opacity="0.8"/>

<!-- horizon sea line -->
<path d="M 0 1580 C 700 1555, 1500 1560, 2200 1572 C 2900 1584, 3400 1570, 3840 1560 L 3840 2160 L 0 2160 Z" fill="url(#swell)"/>

<!-- ================= THE GREAT WAVE ================= -->
<!-- glow under the crest -->
<path d="M 120 1240 C 280 900, 560 560, 1020 440 C 1440 330, 1860 400, 2060 620 C 2200 775, 2190 990, 2030 1080"
      fill="none" stroke="#54e3b2" stroke-width="55" opacity="0.2" filter="url(#soft30)"/>

<!-- main body: steep back, overhanging curl, hollow trough -->
<path d="M 0 2160 L 0 1420
         C 60 1300, 120 1080, 240 900
         C 400 650, 700 470, 1060 430
         C 1460 385, 1880 430, 2070 640
         C 2200 785, 2185 985, 2040 1075
         C 1935 1140, 1800 1115, 1755 1020
         C 1723 953, 1758 880, 1830 858
         C 1740 850, 1640 900, 1560 990
         C 1440 1125, 1370 1300, 1345 1480
         C 1330 1600, 1340 1720, 1370 1830
         C 1180 1700, 980 1620, 760 1620
         C 500 1620, 260 1750, 100 1960
         C 60 2020, 20 2090, 0 2160 Z"
      fill="url(#waveBody)"/>

<!-- lit face band inside the wave -->
<path d="M 180 1500 C 300 1080, 560 700, 1000 560 C 1380 440, 1760 500, 1950 680
         C 1840 640, 1640 620, 1420 680 C 1020 790, 720 1120, 620 1520
         C 600 1600, 596 1680, 610 1750 C 480 1690, 340 1670, 240 1700 C 200 1640, 185 1570, 180 1500 Z"
      fill="url(#waveFace)" opacity="0.45"/>

<!-- water striations following the face -->
<g fill="none" stroke="#54e3b2" stroke-linecap="round" opacity="0.35">
  <path d="M 320 1660 C 420 1240, 660 880, 1060 720" stroke-width="7"/>
  <path d="M 560 1680 C 640 1330, 860 1020, 1220 860" stroke-width="6"/>
  <path d="M 850 1660 C 920 1390, 1100 1130, 1400 990" stroke-width="6"/>
  <path d="M 1130 1720 C 1180 1480, 1320 1230, 1560 1080" stroke-width="5"/>
</g>

<!-- crest edge: foam scallops along the lip (bumpy, not smooth) -->
<g fill="none" stroke="#54e3b2" stroke-width="13" stroke-linecap="round">
  <path d="M 240 900 C 400 650, 700 470, 1060 430"/>
  <path d="M 1060 430 q 60 -28 120 -6 q 55 -22 115 0 q 55 -20 115 2 q 55 -16 110 8 q 50 -10 100 16 q 50 -4 95 24 q 45 2 85 34 q 40 10 70 46 q 30 18 48 58" />
  <path d="M 2070 640 C 2200 785, 2185 985, 2040 1075 C 1935 1140, 1800 1115, 1755 1020 C 1723 953, 1758 880, 1830 858"/>
</g>

<!-- foam fingers reaching down from the overhanging lip into the trough -->
<g fill="#54e3b2">
  <path d="M 1830 858 C 1870 900, 1872 955, 1832 985 C 1858 938, 1846 898, 1806 875 Z"/>
  <path d="M 1700 900 C 1745 945, 1750 1005, 1706 1038 C 1734 987, 1722 944, 1680 918 Z"/>
  <path d="M 1580 965 C 1628 1012, 1634 1076, 1588 1112 C 1618 1058, 1605 1012, 1560 985 Z"/>
  <path d="M 1478 1048 C 1528 1097, 1535 1165, 1487 1203 C 1518 1146, 1505 1098, 1458 1069 Z"/>
  <path d="M 1398 1146 C 1448 1198, 1456 1268, 1406 1308 C 1438 1248, 1425 1198, 1378 1168 Z"/>
  <path d="M 1345 1258 C 1394 1312, 1402 1384, 1350 1425 C 1383 1362, 1370 1311, 1324 1280 Z"/>
</g>
<!-- small foam curls dotting the crest top -->
<g fill="#dcd7ba">
  <circle cx="1120" cy="415" r="7" opacity="0.8"/><circle cx="1240" cy="412" r="6" opacity="0.7"/>
  <circle cx="1370" cy="420" r="7" opacity="0.75"/><circle cx="1500" cy="440" r="6" opacity="0.65"/>
  <circle cx="1630" cy="470" r="7" opacity="0.7"/><circle cx="1750" cy="512" r="6" opacity="0.6"/>
  <circle cx="1860" cy="566" r="7" opacity="0.65"/><circle cx="1955" cy="632" r="6" opacity="0.55"/>
  <circle cx="1010" cy="440" r="5" opacity="0.6"/><circle cx="900" cy="480" r="6" opacity="0.55"/>
</g>
<!-- spray blown off the crest -->
<g fill="#dcd7ba">
  <circle cx="1300" cy="330" r="5" opacity="0.5"/><circle cx="1520" cy="350" r="4" opacity="0.45"/>
  <circle cx="1720" cy="400" r="5" opacity="0.45"/><circle cx="1930" cy="480" r="4" opacity="0.4"/>
  <circle cx="2090" cy="560" r="5" opacity="0.4"/><circle cx="1420" cy="290" r="3" opacity="0.35"/>
  <circle cx="1660" cy="320" r="3" opacity="0.3"/><circle cx="1130" cy="350" r="4" opacity="0.4"/>
  <circle cx="2160" cy="700" r="4" opacity="0.35"/><circle cx="2220" cy="820" r="3" opacity="0.3"/>
</g>
<g fill="#54e3b2">
  <circle cx="1795" cy="1060" r="6" opacity="0.6"/><circle cx="1665" cy="1120" r="5" opacity="0.55"/>
  <circle cx="1545" cy="1200" r="6" opacity="0.5"/><circle cx="1445" cy="1300" r="5" opacity="0.45"/>
  <circle cx="1390" cy="1420" r="6" opacity="0.4"/>
</g>

<!-- secondary wave in the trough, echoing the big one -->
<path d="M 2280 2160 C 2340 1960, 2500 1790, 2740 1740 C 2990 1688, 3230 1740, 3360 1870 C 3300 1855, 3180 1860, 3080 1920 C 2940 2005, 2860 2090, 2830 2160 Z"
      fill="url(#waveBody)"/>
<path d="M 2740 1740 C 2990 1688, 3230 1740, 3360 1870" fill="none" stroke="#54e3b2" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
<g fill="#54e3b2" opacity="0.8">
  <path d="M 3360 1870 C 3390 1905, 3388 1950, 3352 1972 C 3372 1938, 3364 1906, 3334 1888 Z"/>
  <path d="M 3270 1830 C 3302 1862, 3302 1905, 3268 1926 C 3288 1894, 3280 1863, 3250 1846 Z"/>
</g>

<!-- small foreground swell, bottom left -->
<path d="M 0 2160 C 200 2040, 480 1990, 760 2030 C 560 2060, 360 2110, 220 2160 Z" fill="#181820"/>
<path d="M 0 2100 C 200 2010, 480 1980, 760 2028" fill="none" stroke="#54e3b2" stroke-width="8" stroke-linecap="round" opacity="0.5"/>

<rect width="3840" height="2160" fill="url(#vignette)"/>
</svg>
</body></html>
