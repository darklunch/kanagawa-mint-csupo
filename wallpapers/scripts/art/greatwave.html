<!DOCTYPE html>
<html><head><style>html,body{margin:0;padding:0;overflow:hidden}</style></head>
<body>
<svg width="3840" height="2160" viewBox="0 0 3840 2160" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#16161d"/>
    <stop offset="0.65" stop-color="#1c1c26"/>
    <stop offset="1" stop-color="#1f1f28"/>
  </linearGradient>
  <radialGradient id="sunglow" cx="0.5" cy="0.5" r="0.5">
    <stop offset="0" stop-color="#ff9e3b" stop-opacity="0.32"/>
    <stop offset="0.5" stop-color="#ff9e3b" stop-opacity="0.10"/>
    <stop offset="1" stop-color="#ff9e3b" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#e6c384"/>
    <stop offset="1" stop-color="#ff9e3b"/>
  </linearGradient>
  <linearGradient id="waveBody" x1="0" y1="0" x2="0.3" y2="1">
    <stop offset="0" stop-color="#2d4f67"/>
    <stop offset="0.45" stop-color="#223249"/>
    <stop offset="1" stop-color="#16161d"/>
  </linearGradient>
  <linearGradient id="waveInner" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#3a6a8a"/>
    <stop offset="1" stop-color="#223249"/>
  </linearGradient>
  <linearGradient id="swell" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#223249"/>
    <stop offset="1" stop-color="#16161d"/>
  </linearGradient>
  <radialGradient id="vignette" cx="0.5" cy="0.42" r="0.85">
    <stop offset="0.55" stop-color="#000000" stop-opacity="0"/>
    <stop offset="1" stop-color="#0d0d12" stop-opacity="0.55"/>
  </radialGradient>
  <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="14"/>
  </filter>
  <filter id="soft30" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="30"/>
  </filter>
</defs>

<!-- sky -->
<rect width="3840" height="2160" fill="url(#sky)"/>

<!-- stars -->
<g fill="#dcd7ba">
  <circle cx="420" cy="260" r="3" opacity="0.5"/><circle cx="880" cy="150" r="2" opacity="0.35"/>
  <circle cx="1300" cy="330" r="2.5" opacity="0.45"/><circle cx="1750" cy="180" r="2" opacity="0.3"/>
  <circle cx="2150" cy="290" r="3" opacity="0.4"/><circle cx="640" cy="520" r="2" opacity="0.3"/>
  <circle cx="1560" cy="480" r="2" opacity="0.35"/><circle cx="240" cy="720" r="2.5" opacity="0.3"/>
  <circle cx="1980" cy="620" r="2" opacity="0.25"/><circle cx="1100" cy="640" r="2" opacity="0.3"/>
  <circle cx="3560" cy="220" r="2.5" opacity="0.4"/><circle cx="3300" cy="140" r="2" opacity="0.3"/>
</g>

<!-- sun with glow -->
<circle cx="3020" cy="560" r="620" fill="url(#sunglow)"/>
<circle cx="3020" cy="560" r="190" fill="url(#sun)"/>
<g fill="#1f1f28" clip-path="circle(190px at 3020px 560px)">
  <rect x="2820" y="600" width="400" height="10"/>
  <rect x="2820" y="648" width="400" height="16"/>
  <rect x="2820" y="704" width="400" height="22"/>
</g>

<!-- distant Fuji -->
<path d="M 2560 1330 L 3080 940 L 3700 1330 Z" fill="#181820"/>
<path d="M 2985 1010 L 3080 940 L 3180 1012 L 3130 1005 L 3095 1030 L 3060 1002 L 3030 1028 Z" fill="#7aa89f" opacity="0.85"/>

<!-- far swell behind the wave -->
<path d="M 0 1400 C 600 1330, 1300 1290, 2000 1330 C 2700 1370, 3300 1310, 3840 1260 L 3840 2160 L 0 2160 Z" fill="url(#swell)" opacity="0.85"/>

<!-- THE GREAT WAVE -->
<!-- crest glow underlay -->
<path d="M 40 1620 C 300 1300, 700 1020, 1150 880 C 1650 705, 2100 600, 2420 615 C 2740 630, 2900 800, 2880 975 C 2862 1130, 2700 1215, 2545 1178 C 2440 1152, 2395 1060, 2450 985"
      fill="none" stroke="#54e3b2" stroke-width="60" opacity="0.22" filter="url(#soft30)"/>
<!-- body -->
<path d="M 0 2160 L 0 1700 C 250 1380, 660 1060, 1150 880 C 1650 705, 2100 600, 2420 615 C 2740 630, 2900 800, 2880 975 C 2862 1130, 2700 1215, 2545 1178 C 2440 1152, 2395 1060, 2450 985
         C 2380 1120, 2220 1220, 2000 1290 C 1600 1418, 1050 1620, 620 1900 C 430 2020, 300 2090, 220 2160 Z"
      fill="url(#waveBody)"/>
<!-- inner face highlight of the wave -->
<path d="M 300 2160 C 520 1830, 900 1520, 1350 1330 C 1750 1165, 2080 1080, 2280 1090 C 2100 1210, 1850 1310, 1550 1430 C 1150 1590, 750 1860, 560 2160 Z"
      fill="url(#waveInner)" opacity="0.5"/>
<!-- crest line -->
<path d="M 40 1620 C 300 1300, 700 1020, 1150 880 C 1650 705, 2100 600, 2420 615 C 2740 630, 2900 800, 2880 975 C 2862 1130, 2700 1215, 2545 1178 C 2440 1152, 2395 1060, 2450 985"
      fill="none" stroke="#54e3b2" stroke-width="16" stroke-linecap="round"/>
<!-- foam claws hanging from the curl -->
<g fill="#54e3b2">
  <path d="M 2450 985 C 2500 1030, 2510 1090, 2470 1120 C 2495 1070, 2480 1030, 2432 1005 Z"/>
  <path d="M 2330 1075 C 2385 1115, 2400 1180, 2355 1215 C 2385 1160, 2370 1115, 2312 1092 Z"/>
  <path d="M 2180 1150 C 2240 1190, 2258 1258, 2210 1295 C 2243 1238, 2228 1192, 2162 1168 Z"/>
  <path d="M 2010 1220 C 2072 1262, 2090 1332, 2040 1370 C 2075 1310, 2060 1264, 1992 1240 Z"/>
  <path d="M 1830 1290 C 1893 1333, 1912 1405, 1860 1444 C 1897 1382, 1882 1336, 1812 1311 Z"/>
  <path d="M 1640 1365 C 1704 1409, 1724 1483, 1670 1523 C 1708 1459, 1693 1412, 1622 1387 Z"/>
  <path d="M 1445 1445 C 1510 1490, 1530 1565, 1475 1606 C 1514 1541, 1499 1493, 1427 1467 Z"/>
  <path d="M 1245 1535 C 1310 1580, 1332 1657, 1276 1699 C 1316 1632, 1300 1584, 1227 1558 Z"/>
</g>
<!-- foam spray -->
<g fill="#dcd7ba">
  <circle cx="2520" cy="900" r="9" opacity="0.9"/><circle cx="2570" cy="840" r="7" opacity="0.7"/>
  <circle cx="2640" cy="790" r="10" opacity="0.8"/><circle cx="2720" cy="760" r="6" opacity="0.6"/>
  <circle cx="2480" cy="810" r="6" opacity="0.6"/><circle cx="2600" cy="730" r="5" opacity="0.5"/>
  <circle cx="2380" cy="880" r="7" opacity="0.7"/><circle cx="2310" cy="960" r="5" opacity="0.55"/>
  <circle cx="2680" cy="880" r="7" opacity="0.65"/><circle cx="2750" cy="830" r="5" opacity="0.5"/>
  <circle cx="2820" cy="900" r="6" opacity="0.5"/><circle cx="2760" cy="950" r="8" opacity="0.6"/>
  <circle cx="2260" cy="820" r="4" opacity="0.45"/><circle cx="2430" cy="750" r="5" opacity="0.5"/>
  <circle cx="2540" cy="690" r="4" opacity="0.4"/><circle cx="2660" cy="660" r="4" opacity="0.35"/>
</g>
<g fill="#54e3b2">
  <circle cx="2500" cy="945" r="6" opacity="0.8"/><circle cx="2360" cy="1030" r="5" opacity="0.7"/>
  <circle cx="2210" cy="1105" r="6" opacity="0.7"/><circle cx="2045" cy="1180" r="5" opacity="0.65"/>
  <circle cx="1870" cy="1250" r="6" opacity="0.6"/><circle cx="1690" cy="1325" r="5" opacity="0.6"/>
  <circle cx="1495" cy="1405" r="6" opacity="0.55"/><circle cx="1300" cy="1490" r="5" opacity="0.5"/>
</g>

<!-- front swell -->
<path d="M 2200 2160 C 2500 1880, 2950 1720, 3400 1740 C 3600 1750, 3760 1790, 3840 1830 L 3840 2160 Z" fill="#181820"/>
<path d="M 2200 2160 C 2500 1880, 2950 1720, 3400 1740 C 3600 1750, 3760 1790, 3840 1830"
      fill="none" stroke="#54e3b2" stroke-width="12" stroke-linecap="round" opacity="0.85"/>
<path d="M 2200 2160 C 2500 1880, 2950 1720, 3400 1740 C 3600 1750, 3760 1790, 3840 1830"
      fill="none" stroke="#54e3b2" stroke-width="44" stroke-linecap="round" opacity="0.15" filter="url(#soft)"/>

<!-- vignette -->
<rect width="3840" height="2160" fill="url(#vignette)"/>
</svg>
</body></html>
