# Kanagawa Mint-Csupo — Alacritty theme (spec v1.3.0)
# Install: add to alacritty.toml:  [general] import = ["path/to/kanagawa-mint-csupo.toml"]

[colors.primary]
background = "#1f1f28"
foreground = "#c8c093"
bright_foreground = "#dcd7ba"

[colors.cursor]
text = "#16161d"
cursor = "#54e3b2"

[colors.selection]
text = "#dcd7ba"
background = "#2d4f67"

[colors.normal]
black   = "#16161d"
red     = "#c34043"
green   = "#76946a"
yellow  = "#c0a36e"
blue    = "#7e9cd8"
magenta = "#957fb8"
cyan    = "#54e3b2"
white   = "#dcd7ba"

[colors.bright]
black   = "#54546d"
red     = "#e46876"
green   = "#98bb6c"
yellow  = "#e6c384"
blue    = "#7fb4ca"
magenta = "#938aa9"
cyan    = "#7aa89f"
white   = "#ffffff"
