<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>KMC Recolor — Kanagawa Mint-Csupo</title>
<style>
  :root {
    --bg: #1f1f28; --chrome: #181820; --panel: #1a1a22; --ink: #16161d;
    --border: #2a2a37; --text: #c8c093; --muted: #727169; --mint: #54e3b2;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: var(--bg); color: var(--text);
    font-family: Consolas, monospace; display: flex; flex-direction: column; align-items: center;
  }
  header { width: 100%; background: var(--chrome); border-bottom: 1px solid var(--border); padding: 14px 24px; }
  h1 { margin: 0; font-size: 16px; color: var(--mint); font-weight: normal; }
  h1 span { color: var(--muted); }
  main { width: min(1100px, 94vw); padding: 20px 0 40px; }
  #drop {
    border: 2px dashed var(--border); border-radius: 8px; background: var(--panel);
    padding: 46px 20px; text-align: center; color: var(--muted); cursor: pointer; transition: border-color .15s;
  }
  #drop.hover, #drop:hover { border-color: var(--mint); color: var(--text); }
  #drop input { display: none; }
  .controls { display: flex; gap: 24px; align-items: center; margin: 18px 0; flex-wrap: wrap; }
  .controls label { color: var(--muted); font-size: 13px; }
  input[type=range] { accent-color: var(--mint); width: 180px; vertical-align: middle; }
  button {
    background: var(--ink); color: var(--mint); border: 1px solid var(--mint);
    padding: 8px 18px; border-radius: 4px; font-family: inherit; font-size: 13px; cursor: pointer;
  }
  button:hover { background: var(--mint); color: var(--ink); }
  button:disabled { border-color: var(--border); color: var(--muted); background: var(--panel); cursor: default; }
  canvas { max-width: 100%; border: 1px solid var(--border); border-radius: 4px; display: none; }
  .swatches { display: flex; gap: 0; height: 14px; border-radius: 3px; overflow: hidden; margin-top: 8px; border: 1px solid var(--border); }
  .swatches div { flex: 1; }
  footer { color: var(--muted); font-size: 12px; margin-top: 14px; }
</style>
</head>
<body>
<header><h1>KMC RECOLOR <span>// adapt any image to the Kanagawa Mint-Csupo palette — runs 100% locally</span></h1></header>
<main>
  <div id="drop">
    <input type="file" id="file" accept="image/*">
    drop an image here, or click to browse
    <div class="swatches" id="swatches"></div>
  </div>
  <div class="controls">
    <label>strength <input type="range" id="strength" min="0" max="100" value="100"> <span id="strengthVal">100%</span></label>
    <label><input type="checkbox" id="mintPop" checked> mint pop (brightest pixels &rarr; electric mint)</label>
    <button id="save" disabled>download PNG</button>
  </div>
  <canvas id="cv"></canvas>
  <footer>Sumi ink &rarr; wave blue &rarr; patina &rarr; mint &rarr; parchment, by luminance. Spec v1.3.0 &middot; Dark Lunch Studios</footer>
</main>
<script>
// Palette ramp, dark -> light (spec v1.3.0). Position = luminance stop 0..1.
const RAMP = [
  [0.00, '#16161d'], [0.10, '#1f1f28'], [0.22, '#223249'], [0.38, '#2d4f67'],
  [0.52, '#7aa89f'], [0.68, '#54e3b2'], [0.84, '#c8c093'], [1.00, '#dcd7ba'],
];
const RAMP_NOMINT = [
  [0.00, '#16161d'], [0.10, '#1f1f28'], [0.22, '#223249'], [0.38, '#2d4f67'],
  [0.55, '#7aa89f'], [0.75, '#c8c093'], [1.00, '#dcd7ba'],
];
const hex2rgb = h => [1, 3, 5].map(i => parseInt(h.slice(i, i + 2), 16));

function buildLUT(ramp) {
  const stops = ramp.map(([p, h]) => [p, hex2rgb(h)]);
  const lut = new Uint8ClampedArray(256 * 3);
  for (let i = 0; i < 256; i++) {
    const t = i / 255;
    let a = stops[0], b = stops[stops.length - 1];
    for (let s = 0; s < stops.length - 1; s++)
      if (t >= stops[s][0] && t <= stops[s + 1][0]) { a = stops[s]; b = stops[s + 1]; break; }
    const f = b[0] === a[0] ? 0 : (t - a[0]) / (b[0] - a[0]);
    for (let c = 0; c < 3; c++) lut[i * 3 + c] = a[1][c] + (b[1][c] - a[1][c]) * f;
  }
  return lut;
}

const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
let original = null; // ImageData of the loaded picture

function render() {
  if (!original) return;
  const strength = document.getElementById('strength').value / 100;
  const lut = buildLUT(document.getElementById('mintPop').checked ? RAMP : RAMP_NOMINT);
  const src = original.data, out = ctx.createImageData(original.width, original.height), d = out.data;
  for (let i = 0; i < src.length; i += 4) {
    const lum = Math.round(0.2126 * src[i] + 0.7152 * src[i + 1] + 0.0722 * src[i + 2]);
    for (let c = 0; c < 3; c++)
      d[i + c] = src[i + c] + (lut[lum * 3 + c] - src[i + c]) * strength;
    d[i + 3] = src[i + 3];
  }
  ctx.putImageData(out, 0, 0);
}

function load(file) {
  const img = new Image();
  img.onload = () => {
    cv.width = img.width; cv.height = img.height; cv.style.display = 'block';
    ctx.drawImage(img, 0, 0);
    original = ctx.getImageData(0, 0, cv.width, cv.height);
    document.getElementById('save').disabled = false;
    render();
  };
  img.src = URL.createObjectURL(file);
}

const drop = document.getElementById('drop'), fileIn = document.getElementById('file');
drop.addEventListener('click', () => fileIn.click());
fileIn.addEventListener('change', e => e.target.files[0] && load(e.target.files[0]));
['dragover', 'dragleave', 'drop'].forEach(ev => drop.addEventListener(ev, e => {
  e.preventDefault();
  drop.classList.toggle('hover', ev === 'dragover');
  if (ev === 'drop' && e.dataTransfer.files[0]) load(e.dataTransfer.files[0]);
}));
document.getElementById('strength').addEventListener('input', e => {
  document.getElementById('strengthVal').textContent = e.target.value + '%'; render();
});
document.getElementById('mintPop').addEventListener('change', render);
document.getElementById('save').addEventListener('click', () => {
  const a = document.createElement('a');
  a.download = 'kmc-recolored.png';
  a.href = cv.toDataURL('image/png');
  a.click();
});
// palette preview strip in the drop zone
document.getElementById('swatches').innerHTML =
  RAMP.map(([, h]) => `<div style="background:${h}"></div>`).join('');
</script>
</body>
</html>
